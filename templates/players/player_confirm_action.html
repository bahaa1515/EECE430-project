{% extends 'base.html' %}
{% block content %}
<div class="confirm-page-card">
  <h1 class="page-header">{{ action_title }}</h1>
  <p class="page-subtitle"><strong>{{ player.name }}</strong> will be updated if you continue.</p>
  <div class="info-note">{{ action_text }}</div>
  <form method="post" class="form-actions">
    {% csrf_token %}
    <a href="{% url 'players' %}" class="btn btn-primary">Cancel</a>
    <button type="submit" class="btn btn-red">{{ submit_label }}</button>
  </form>
</div>
{% endblock %}
