{% extends 'base.html' %}
{% block content %}
<div class="confirm-page-card">
  <h1 class="page-header">Delete Session</h1>
  <p class="page-subtitle">This will permanently remove <strong>{{ match.title }}</strong> and its attendance records.</p>
  <div class="info-note">{{ match.match_type }} | {{ match.date|date:"D, M d, Y | g:i A" }} | {{ match.location }}</div>
  <form method="post" class="form-actions">
    {% csrf_token %}
    <a href="{% url 'attendance' %}" class="btn btn-primary">Cancel</a>
    <button type="submit" class="btn btn-red">Delete Session</button>
  </form>
</div>
{% endblock %}
